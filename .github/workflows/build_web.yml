name: Build Flutter Web

on:
  workflow_dispatch:
    inputs:
      wasm:
        description: Build using WebAssembly
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      wasm:
        description: Build using WebAssembly
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.35.7'
        channel: 'stable'

    - name: Get dependencies
      run: flutter pub get

    - name: Enable Flutter web
      run: flutter config --enable-web

    - name: Build Flutter web app - with WASM
      if: ${{ inputs.wasm }}
      run: flutter build web --wasm

    - name: Build Flutter web app - no WASM
      if: ${{ !inputs.wasm }}
      run: flutter build web --no-wasm

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: build/web
        retention-days: 1  # Adjust as needed
